services:
  postgres:
    image: postgres:18-alpine
    container_name: timelend-postgres
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_DB=timelend-website
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
    name: timelend-postgres-data
