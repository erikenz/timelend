services:
  postgres:
    image: postgres:16-alpine
    container_name: timelend-postgres
    environment:
      POSTGRES_DB: timelend
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - timelend-postgres-data:/var/lib/postgresql/data

volumes:
  timelend-postgres-data:
