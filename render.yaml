services:
  - type: web
    name: timelend-api
    env: node
    plan: free
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter api build
    startCommand: pnpm --filter api start:prod
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: require
      - key: RPC_URL
        value: https://api.avax-test.network/ext/bc/C/rpc
      - key: CONTRACT_ADDRESS
        value: 0x5192258383C8cc29571e57697eAD535b96535bdE
      - key: PRIVATE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: MODE
        value: real
      - key: PORT
        value: "3000"
